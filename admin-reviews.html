<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модерация отзывов — Марья</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            cream:  { DEFAULT: '#FDF8F3', dark: '#1A1612' },
            sand:   { DEFAULT: '#E8DDD0', dark: '#2A2420' },
            warm:   { DEFAULT: '#C4A882', dark: '#8B7355' },
            accent: { DEFAULT: '#D4956A', dark: '#E8A87A' },
            sage:   { DEFAULT: '#8BA888', dark: '#6B8A68' },
            ink:    { DEFAULT: '#2C2018', dark: '#F5EDE4' },
            muted:  { DEFAULT: '#7A6A5A', dark: '#A89880' },
          },
          fontFamily: {
            serif: ['Georgia', 'Cambria', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { font-family: 'Inter', system-ui, sans-serif; }
    *, *::before, *::after { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C4A882; border-radius: 3px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _supabase = window.supabase.createClient(
      'https://cizdsiqolarjcgmwbafp.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpemRzaXFvbGFyamNnbXdiYWZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDEyMDIsImV4cCI6MjA4ODM3NzIwMn0.t9bEOTaTBmtzC2X4pA_elQomCwgZjEeuZCFdPAxdnK8'
    );
  </script>
</head>
<body class="bg-cream dark:bg-cream-dark text-ink dark:text-ink-dark antialiased min-h-screen">

  <!-- Экран входа -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <a href="index.html" class="font-serif text-3xl text-ink dark:text-ink-dark hover:text-accent transition-colors">Марья</a>
        <p class="text-sm text-muted dark:text-muted-dark mt-2">Модерация отзывов</p>
      </div>
      <div class="bg-sand/30 dark:bg-sand-dark/20 border border-sand/60 dark:border-sand-dark/30 rounded-3xl p-8 space-y-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-muted dark:text-muted-dark mb-2">Пароль</label>
          <input
            id="pwd-input"
            type="password"
            placeholder="Введите пароль"
            class="w-full px-4 py-3 rounded-2xl border border-sand dark:border-sand-dark/50 bg-cream dark:bg-cream-dark text-ink dark:text-ink-dark text-sm focus:outline-none focus:border-accent transition-colors"
            onkeydown="if(event.key==='Enter') checkLogin()"
          />
          <p id="pwd-error" class="hidden text-xs text-red-500 mt-1">Неверный пароль</p>
        </div>
        <button onclick="checkLogin()" class="w-full py-3 bg-accent hover:bg-accent/90 text-white font-semibold rounded-full text-sm transition-colors shadow-md shadow-accent/20">
          Войти
        </button>
      </div>
      <p class="text-center text-xs text-muted dark:text-muted-dark mt-4">
        Пароль по умолчанию: <span class="font-mono font-semibold text-accent">marya2026</span>
      </p>
    </div>
  </div>

  <!-- Панель модерации -->
  <div id="admin-panel" class="hidden">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-cream/90 dark:bg-cream-dark/90 backdrop-blur-md border-b border-sand/40 dark:border-sand-dark/20 h-[60px] flex items-center px-4 sm:px-6">
      <div class="max-w-5xl mx-auto w-full flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="index.html">
            <img src="лого новый-nobg.png" alt="Марья" style="height:30px;width:auto;">
          </a>
          <span class="text-muted dark:text-muted-dark opacity-30">/</span>
          <span class="text-sm font-medium text-muted dark:text-muted-dark">Отзывы</span>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="toggleDark()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-sand/60 dark:bg-sand-dark/40 text-xs text-muted dark:text-muted-dark font-medium hover:bg-sand transition-colors">
            <span class="block dark:hidden">☀️</span>
            <span class="hidden dark:block">🌙</span>
          </button>
          <button onclick="logout()" class="text-xs text-muted dark:text-muted-dark hover:text-accent transition-colors font-medium">
            Выйти
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-10">

      <!-- Счётчики -->
      <div class="grid grid-cols-3 gap-4 mb-10">
        <div class="p-5 rounded-2xl bg-warm/10 dark:bg-warm-dark/10 border border-warm/20 dark:border-warm-dark/20 text-center">
          <p class="text-3xl font-serif font-normal text-ink dark:text-ink-dark" id="count-pending">0</p>
          <p class="text-xs text-muted dark:text-muted-dark mt-1 font-medium uppercase tracking-wider">На проверке</p>
        </div>
        <div class="p-5 rounded-2xl bg-sage/10 dark:bg-sage-dark/10 border border-sage/20 dark:border-sage-dark/20 text-center">
          <p class="text-3xl font-serif font-normal text-ink dark:text-ink-dark" id="count-approved">0</p>
          <p class="text-xs text-muted dark:text-muted-dark mt-1 font-medium uppercase tracking-wider">Опубликованы</p>
        </div>
        <div class="p-5 rounded-2xl bg-sand/40 dark:bg-sand-dark/20 border border-sand/60 dark:border-sand-dark/30 text-center">
          <p class="text-3xl font-serif font-normal text-ink dark:text-ink-dark" id="count-rejected">0</p>
          <p class="text-xs text-muted dark:text-muted-dark mt-1 font-medium uppercase tracking-wider">Отклонены</p>
        </div>
      </div>

      <!-- Фильтры -->
      <div class="flex gap-2 mb-6 flex-wrap">
        <button onclick="setFilter('pending')" id="filter-pending" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-accent bg-accent/10 text-accent transition-colors">
          На проверке
        </button>
        <button onclick="setFilter('approved')" id="filter-approved" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-sand dark:border-sand-dark/50 text-muted dark:text-muted-dark hover:border-accent/50 transition-colors">
          Опубликованные
        </button>
        <button onclick="setFilter('rejected')" id="filter-rejected" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-sand dark:border-sand-dark/50 text-muted dark:text-muted-dark hover:border-accent/50 transition-colors">
          Отклонённые
        </button>
        <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-4 py-2 rounded-full text-sm font-medium border-2 border-sand dark:border-sand-dark/50 text-muted dark:text-muted-dark hover:border-accent/50 transition-colors">
          Все
        </button>
      </div>

      <!-- Список отзывов -->
      <div id="reviews-list" class="space-y-4"></div>

      <!-- Пустое состояние -->
      <div id="empty-state" class="hidden text-center py-20">
        <p class="text-4xl mb-4">📭</p>
        <p class="text-lg font-serif text-ink dark:text-ink-dark mb-2">Отзывов нет</p>
        <p class="text-sm text-muted dark:text-muted-dark">В этой категории пока ничего нет</p>
      </div>

    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-ink dark:bg-ink-dark text-cream dark:text-cream rounded-full text-sm font-medium shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap">
    Сохранено
  </div>

  <script>
    // ── Пароль ────────────────────────────────
    const ADMIN_PASSWORD = 'marya2026';

    function checkLogin() {
      const val = document.getElementById('pwd-input').value;
      if (val === ADMIN_PASSWORD) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        renderReviews();
      } else {
        document.getElementById('pwd-error').classList.remove('hidden');
        document.getElementById('pwd-input').focus();
      }
    }

    function logout() {
      document.getElementById('admin-panel').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('pwd-input').value = '';
    }

    // ── Dark mode ─────────────────────────────
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('marya-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('marya-theme') === 'dark' || (!localStorage.getItem('marya-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    // ── Фильтр ────────────────────────────────
    let currentFilter = 'pending';

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.id === 'filter-' + filter;
        btn.classList.toggle('border-accent', isActive);
        btn.classList.toggle('bg-accent/10', isActive);
        btn.classList.toggle('text-accent', isActive);
        btn.classList.toggle('border-sand', !isActive);
        btn.classList.toggle('dark:border-sand-dark/50', !isActive);
        btn.classList.toggle('text-muted', !isActive);
      });
      renderReviews();
    }

    // ── Счётчики ──────────────────────────────
    async function updateCounts() {
      const { data: all } = await _supabase.from('reviews').select('status');
      if (!all) return;
      document.getElementById('count-pending').textContent  = all.filter(r => r.status === 'pending').length;
      document.getElementById('count-approved').textContent = all.filter(r => r.status === 'approved').length;
      document.getElementById('count-rejected').textContent = all.filter(r => r.status === 'rejected').length;
    }

    // ── Звёзды ────────────────────────────────
    function stars(n) {
      return Array.from({length: 5}, (_, i) =>
        `<span style="color:${i < n ? '#D4956A' : '#E8DDD0'}">★</span>`
      ).join('');
    }

    // ── Статус-бейдж ──────────────────────────
    function statusBadge(status) {
      if (status === 'pending')  return '<span class="px-2 py-0.5 rounded-full bg-warm/20 text-warm dark:text-warm-dark text-xs font-medium">На проверке</span>';
      if (status === 'approved') return '<span class="px-2 py-0.5 rounded-full bg-sage/20 text-sage dark:text-sage-dark text-xs font-medium">Опубликован</span>';
      if (status === 'rejected') return '<span class="px-2 py-0.5 rounded-full bg-sand/60 dark:bg-sand-dark/40 text-muted dark:text-muted-dark text-xs font-medium">Отклонён</span>';
    }

    // ── Рендер ────────────────────────────────
    async function renderReviews() {
      await updateCounts();
      let query = _supabase.from('reviews').select('*').order('created_at', { ascending: false });
      if (currentFilter !== 'all') query = query.eq('status', currentFilter);
      const { data: filtered } = await query;

      const list = document.getElementById('reviews-list');
      const empty = document.getElementById('empty-state');
      if (!filtered || !filtered.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      list.innerHTML = filtered.map(review => `
        <div id="card-${review.id}" class="p-5 sm:p-6 rounded-2xl border border-sand/40 dark:border-sand-dark/20 bg-sand/20 dark:bg-sand-dark/10 space-y-4">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-warm/20 dark:bg-warm-dark/20 flex items-center justify-center text-base font-semibold text-warm dark:text-warm-dark flex-shrink-0">
                ${(review.author_name || '?').charAt(0).toUpperCase()}
              </div>
              <div>
                <p class="text-sm font-semibold text-ink dark:text-ink-dark">${escHtml(review.author_name || '')}</p>
                <p class="text-xs text-muted dark:text-muted-dark">${escHtml(review.skin_type || '')} · ${new Date(review.created_at).toLocaleDateString('ru-RU')}</p>
              </div>
            </div>
            <div class="flex items-center gap-2 flex-wrap">
              ${statusBadge(review.status)}
              <span class="text-xs text-muted dark:text-muted-dark">Товар #${review.product_id}</span>
            </div>
          </div>
          <div>
            <div class="text-lg mb-2">${stars(review.rating)}</div>
            <p class="text-sm text-ink dark:text-ink-dark leading-relaxed">${escHtml(review.body || '')}</p>
          </div>
          <div class="flex gap-2 flex-wrap pt-1">
            ${review.status !== 'approved' ? `<button onclick="changeStatus(${review.id}, 'approved')" class="inline-flex items-center gap-1.5 px-4 py-2 bg-sage/20 hover:bg-sage/30 text-sage dark:text-sage-dark text-xs font-semibold rounded-full transition-colors border border-sage/20"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Опубликовать</button>` : ''}
            ${review.status !== 'rejected' ? `<button onclick="changeStatus(${review.id}, 'rejected')" class="inline-flex items-center gap-1.5 px-4 py-2 bg-sand/50 dark:bg-sand-dark/30 hover:bg-red-50 dark:hover:bg-red-950/20 text-muted dark:text-muted-dark hover:text-red-500 text-xs font-semibold rounded-full transition-colors border border-sand/60 dark:border-sand-dark/40"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-width="2.5" stroke-linecap="round"/></svg>Отклонить</button>` : ''}
            ${review.status !== 'pending' ? `<button onclick="changeStatus(${review.id}, 'pending')" class="inline-flex items-center gap-1.5 px-4 py-2 bg-warm/10 hover:bg-warm/20 text-warm dark:text-warm-dark text-xs font-semibold rounded-full transition-colors border border-warm/20"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round"/></svg>Вернуть на проверку</button>` : ''}
            <button onclick="deleteReview(${review.id})" class="inline-flex items-center gap-1.5 px-4 py-2 text-muted dark:text-muted-dark hover:text-red-500 text-xs font-semibold rounded-full transition-colors ml-auto"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round"/></svg>Удалить</button>
          </div>
        </div>`).join('');
    }

    // ── Действия ──────────────────────────────
    async function changeStatus(id, newStatus) {
      await _supabase.from('reviews').update({ status: newStatus }).eq('id', id);
      const messages = { approved: 'Отзыв опубликован', rejected: 'Отзыв отклонён', pending: 'Возвращён на проверку' };
      showToast(messages[newStatus]);
      renderReviews();
    }

    async function deleteReview(id) {
      if (!confirm('Удалить отзыв навсегда?')) return;
      await _supabase.from('reviews').delete().eq('id', id);
      showToast('Отзыв удалён');
      renderReviews();
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Toast ─────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('opacity-0');
      t.classList.add('opacity-100');
      setTimeout(() => { t.classList.remove('opacity-100'); t.classList.add('opacity-0'); }, 2500);
    }
  </script>
</body>
</html>
